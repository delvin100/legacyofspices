<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Returns & Wallet | Legacy of Spices</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/js/custom-ui.js?v=1.8"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#FF7E21', 'primary-hover': '#E66D1A' } } }
        }
    </script>
</head>

<body style="background:#fafaf9;color:#1c1917;font-family:'Outfit',sans-serif;">

    <!-- Sidebar -->
        <aside style="width: 240px; background: white; border-right: 1px solid #e7e5e4; position: fixed; height: 100vh; padding: 24px; z-index: 50; overflow-y: auto; display: flex; flex-direction: column;">
        <div class="logo" style="margin-bottom: 48px; display: flex; align-items: center; gap: 10px; margin-left: -12px;">
            <img src="../assets/images/logo.png" alt="Logo" style="height: 60px; width: auto; object-fit: contain; flex-shrink: 0;">
            <div style="display: flex; flex-direction: column; justify-content: center;">
                <h3 style="font-size: 22px; color: #1c1917; font-weight: 800; line-height: 1; letter-spacing: -0.02em; margin: 0;">Legacy</h3>
                <span style="font-size: 11px; color: #ff7e21; letter-spacing: 0.1em; font-weight: 800; text-transform: uppercase; margin-top: 2px;">Of Spices</span>
            </div>
        </div>

        <nav style="display: flex; flex-direction: column; gap: 4px; flex: 1;">
            <a href="customer-dashboard.html" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; text-decoration: none; color: #44403c; font-weight: 500; font-size: 14px; transition: all 0.2s;" onmouseover="this.style.background='#fafaf9'; this.style.color='#1c1917'" onmouseout="this.style.background='transparent'; this.style.color='#44403c'">
                <img src="https://api.iconify.design/lucide:layout-dashboard.svg?color=%2344403c" width="20" alt="">
                <span style="white-space: nowrap;">Dashboard</span>
            </a>
            <a href="catalog.html" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; text-decoration: none; color: #44403c; font-weight: 500; font-size: 14px; transition: all 0.2s;" onmouseover="this.style.background='#fafaf9'; this.style.color='#1c1917'" onmouseout="this.style.background='transparent'; this.style.color='#44403c'">
                <img src="https://api.iconify.design/lucide:book-open.svg?color=%2344403c" width="20" alt="">
                <span style="white-space: nowrap;">Catalog</span>
            </a>
            <a href="orders.html" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; text-decoration: none; color: #44403c; font-weight: 500; font-size: 14px; transition: all 0.2s;" onmouseover="this.style.background='#fafaf9'; this.style.color='#1c1917'" onmouseout="this.style.background='transparent'; this.style.color='#44403c'">
                <img src="https://api.iconify.design/lucide:shopping-bag.svg?color=%2344403c" width="20" alt="">
                <span style="white-space: nowrap;">Orders</span>
            </a>
            <a href="cart.html" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; text-decoration: none; color: #44403c; font-weight: 500; font-size: 14px; transition: all 0.2s;" onmouseover="this.style.background='#fafaf9'; this.style.color='#1c1917'" onmouseout="this.style.background='transparent'; this.style.color='#44403c'">
                <img src="https://api.iconify.design/lucide:shopping-cart.svg?color=%2344403c" width="20" alt="">
                <span style="white-space: nowrap;">Cart</span>
            </a>
            <a href="auctions.html" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; text-decoration: none; color: #44403c; font-weight: 500; font-size: 14px; transition: all 0.2s;" onmouseover="this.style.background='#fafaf9'; this.style.color='#1c1917'" onmouseout="this.style.background='transparent'; this.style.color='#44403c'">
                <img src="https://api.iconify.design/lucide:gavel.svg?color=%2344403c" width="20" alt="">
                <span style="white-space: nowrap;">Auctions</span>
            </a>

            <a href="market-analytics.html" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; text-decoration: none; color: #44403c; font-weight: 500; font-size: 14px; transition: all 0.2s;" onmouseover="this.style.background='#fafaf9'; this.style.color='#1c1917'" onmouseout="this.style.background='transparent'; this.style.color='#44403c'">
                <img src="https://api.iconify.design/lucide:trending-up.svg?color=%2344403c" width="20" alt="">
                <span style="white-space: nowrap;">Analytics</span>
            </a>
            <a href="returns.html" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; text-decoration: none; color: white; background: #FF7E21; font-weight: 700; font-size: 14px; box-shadow: 0 4px 12px rgba(255, 126, 33, 0.2);">
                <img src="https://api.iconify.design/lucide:rotate-ccw.svg?color=white" width="20" alt="">
                <span style="white-space: nowrap;">Returns & Refunds</span>
            </a>

            <a href="profile.html" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; text-decoration: none; color: #44403c; font-weight: 500; font-size: 14px; transition: all 0.2s;" onmouseover="this.style.background='#fafaf9'; this.style.color='#1c1917'" onmouseout="this.style.background='transparent'; this.style.color='#44403c'">
                <img src="https://api.iconify.design/lucide:user.svg?color=%2344403c" width="20" alt="">
                <span style="white-space: nowrap;">Profile</span>
            </a>
        </nav>

        <div style="margin-top: auto; padding-top: 24px;">
            <button onclick="logout()" style="display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border-radius: 12px; text-decoration: none; color: #ef4444; background: #fef2f2; border: 1px solid #fee2e2; width: 100%; cursor: pointer; font-weight: 700; font-size: 14px; transition: all 0.2s;" onmouseover="this.style.background='#fee2e2'" onmouseout="this.style.background='#fef2f2'">
                <img src="https://api.iconify.design/lucide:log-out.svg?color=%23ef4444" width="18" style="transform: rotate(180deg);" alt="">
                Sign Out
            </button>
        </div>
        <script>
            async function logout() {
                await fetch('../../backend/api/auth/logout.php');
                window.location.href = '../auth/login.html';
            }
        </script>
    </aside>

    <main style="margin-left: 240px;padding:32px 40px;">
        <header style="margin-bottom:40px;">
            <h1 style="font-size:32px;font-weight:800;color:#1c1917;letter-spacing:-0.02em;">Returns & Refunds</h1>
            <p style="font-size:15px;color:#78716c;margin-top:4px;">Manage your return requests and refunds.</p>
        </header>

        <!-- Wallet Card -->
        <div
            style="background:linear-gradient(135deg,#1c1917,#3d2b1f);border-radius:32px;padding:36px;margin-bottom:40px;position:relative;overflow:hidden;">
            <div
                style="position:absolute;top:-30px;right:-30px;width:180px;height:180px;background:rgba(255,126,33,0.15);border-radius:50%;">
            </div>
            <div
                style="position:absolute;bottom:-50px;left:100px;width:240px;height:240px;background:rgba(255,126,33,0.08);border-radius:50%;">
            </div>
            <div style="position:relative;z-index:1;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;">
                    <div>
                        <p
                            style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:8px;display:flex;align-items:center;gap:6px;">
                            <img src="https://api.iconify.design/lucide:shopping-bag.svg?color=rgba(255,255,255,0.5)" width="14"> Total Spend</p>
                        <p id="total-spent-amount"
                            style="font-size:48px;font-weight:800;color:white;letter-spacing:-0.03em;">₹0.00</p>
                        <p style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px;">Cumulative lifetime spending</p>
                    </div>
                    <div style="background:rgba(255,126,33,0.2);border-radius:20px;padding:16px;text-align:center;">
                        <img src="https://api.iconify.design/lucide:credit-card.svg?color=%23FF7E21" width="28" style="margin: 0 auto;">
                        <p style="font-size:10px;color:#FF7E21;font-weight:700;margin-top:8px;">SPENT</p>
                    </div>
                </div>
                </div>
            </div>
        </div>

        <!-- Filter tabs -->
        <div style="display:flex;gap:10px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;">
            <button onclick="loadReturns('all')" id="tab-all"
                style="padding:8px 20px;border-radius:20px;border:1px solid #1c1917;background:#1c1917;color:white;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;">All</button>
            <button onclick="loadReturns('requested')" id="tab-requested"
                style="padding:8px 20px;border-radius:20px;background:white;color:#78716c;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;border:1px solid #e7e5e4;">Requested</button>

            <button onclick="loadReturns('refund_completed')" id="tab-refund_completed"
                style="padding:8px 20px;border-radius:20px;background:white;color:#78716c;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;border:1px solid #e7e5e4;">Refunded</button>
            <button onclick="loadReturns('rejected')" id="tab-rejected"
                style="padding:8px 20px;border-radius:20px;background:white;color:#78716c;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;border:1px solid #e7e5e4;">Rejected</button>
            
            <div style="width:1px;background:#e7e5e4;margin:4px 10px;flex-shrink:0;"></div>
            
            <button onclick="document.getElementById('wallet-history-section').scrollIntoView({behavior:'smooth'})" 
                style="padding:8px 20px;border-radius:20px;background:#eff6ff;color:#1e40af;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;border:1px solid #dbeafe;display:flex;align-items:center;gap:8px;">
                <img src="https://api.iconify.design/lucide:history.svg?color=%231e40af" width="16"> History
            </button>
        </div>

        <!-- Returns List -->
        <div id="returns-list" style="min-height: 400px;">
            <div style="text-align:center;padding:80px 20px;">
                <img src="https://api.iconify.design/lucide:loader-2.svg"
                    style="width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto 12px;">
                <p style="color:#a8a29e;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.15em;">
                    Loading returns...</p>
            </div>
        </div>

        <!-- Wallet History Section -->
        <div id="wallet-history-section" style="margin-top:40px;">
            <div style="background:white;border:1px solid #e7e5e4;border-radius:24px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,0.02);">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                    <h3 style="font-size:18px;font-weight:700;color:#1c1917;display:flex;align-items:center;gap:10px;">
                        <img src="https://api.iconify.design/lucide:history.svg?color=%23FF7E21" width="22">
                        Refund History
                    </h3>
                </div>
                <div id="wallet-transactions-list">
                    <p style="color:#a8a29e;font-size:13px;text-align:center;padding:40px;font-weight:500;">Loading transaction history...</p>
                </div>
            </div>
        </div>
    </main>

    <style>
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <script>
        const STATUS_CONFIG = {
            requested: { label: 'Requested', bg: '#fef3c7', color: '#92400e' },
            under_review: { label: 'Under Review', bg: '#dbeafe', color: '#1e40af' },
            approved: { label: 'Approved', bg: '#d1fae5', color: '#065f46' },
            rejected: { label: 'Rejected', bg: '#fee2e2', color: '#991b1b' },
            refund_processing: { label: 'Refund Processing', bg: '#ede9fe', color: '#5b21b6' },
            refund_completed: { label: 'Refund Completed', bg: '#d1fae5', color: '#065f46' },
        };

        const REASON_LABELS = {
            damaged: 'Product Damaged',
            wrong_item: 'Wrong Item',
            expired: 'Expired Product',
            quality_issue: 'Quality Issue',
            other: 'Other',
        };

        let currentTab = 'all';

        async function loadWallet() {
            try {
                const res = await fetch('../../backend/api/returns/get-wallet.php');
                const data = await res.json();
                if (data.success) {
                    const spent = parseFloat(data.total_spent || 0);
                    document.getElementById('total-spent-amount').innerText = CurrencyManager.format(spent);

                    if (data.transactions && data.transactions.length > 0) {
                        document.getElementById('wallet-transactions-list').innerHTML = data.transactions.map(tx => {
                            let description = tx.description;
                            if (tx.reference_type === 'return' && tx.linked_order_id) {
                                description = `Refund for Order ORD-${tx.linked_order_id.toString().padStart(5, '0')}`;
                            }
                            return `
                            <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid #f5f5f4;">
                                <div style="display:flex;align-items:center;gap:12px;">
                                    <div style="width:36px;height:36px;border-radius:10px;background:${tx.type === 'credit' ? '#ecfdf5' : '#fef2f2'};display:flex;align-items:center;justify-content:center;">
                                        <img src="https://api.iconify.design/lucide:${tx.type === 'credit' ? 'arrow-down-left' : 'arrow-up-right'}.svg?color=${tx.type === 'credit' ? '%2310b981' : '%23ef4444'}" width="18">
                                    </div>
                                    <div>
                                        <p style="font-size:14px;font-weight:700;color:#1c1917;">${description}</p>
                                        <p style="font-size:11px;color:#78716c;font-weight:600;">${new Date(tx.created_at).toLocaleDateString('en-GB')}</p>
                                    </div>
                                </div>
                                <span style="font-weight:800;font-size:15px;color:${tx.type === 'credit' ? '#059669' : '#dc2626'};">
                                    ${tx.type === 'credit' ? '+' : '-'}${CurrencyManager.format(tx.amount)}
                                </span>
                            </div>`;
                        }).join('');
                    } else {
                        document.getElementById('wallet-transactions-list').innerHTML = `
                            <div style="text-align:center;padding:40px;">
                                <p style="color:#a8a29e;font-size:13px;font-weight:600;">No transactions yet</p>
                            </div>`;
                    }
                }
            } catch (e) { console.error('Wallet load error', e); }
        }

        async function loadReturns(status = 'all') {
            currentTab = status;

            // Update tabs
            document.querySelectorAll('[id^="tab-"]').forEach(btn => {
                const isActive = btn.id === 'tab-' + status;
                btn.style.background = isActive ? '#1c1917' : 'white';
                btn.style.color = isActive ? 'white' : '#78716c';
                btn.style.fontWeight = '700';
                btn.style.border = isActive ? '1px solid #1c1917' : '1px solid #e7e5e4';
            });

            const container = document.getElementById('returns-list');
            container.innerHTML = '<div style="text-align:center;padding:60px;"><img src="https://api.iconify.design/lucide:loader-2.svg" style="width:32px;height:32px;animation:spin 1s linear infinite;margin:0 auto;"></div>';

            try {
                const res = await fetch('../../backend/api/returns/get-customer-returns.php');
                const data = await res.json();

                if (!data.success) {
                    container.innerHTML = `<div style="text-align:center;padding:80px;color:#ef4444;font-weight:700;">Failed to load returns.</div>`;
                    return;
                }

                let returns = data.returns || [];
                if (status !== 'all') returns = returns.filter(r => r.status === status);

                if (returns.length === 0) {
                    container.innerHTML = `
                        <div style="text-align:center;padding:80px 20px;background:white;border-radius:24px;border:1px solid #e7e5e4;">
                            <div style="width:64px;height:64px;background:#f5f5f4;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
                                <img src="https://api.iconify.design/lucide:rotate-ccw.svg?color=%23a8a29e" width="32">
                            </div>
                            <h3 style="font-size:18px;font-weight:700;color:#1c1917;margin-bottom:8px;">No Return Requests</h3>
                            <p style="color:#a8a29e;font-size:13px;margin-bottom:20px;">Your returns will appear here once submitted.</p>
                            <a href="orders.html" style="display:inline-block;background:#FF7E21;color:white;padding:12px 28px;border-radius:12px;font-weight:700;font-size:14px;text-decoration:none;">View Orders</a>
                        </div>`;
                    return;
                }

                container.innerHTML = returns.map(r => {
                    const sc = STATUS_CONFIG[r.status] || STATUS_CONFIG['requested'];
                    const date = new Date(r.created_at).toLocaleDateString('en-GB');
                    const amount = parseFloat(r.refund_amount || 0);
                    let displayReason = r.reason.startsWith('Other: ') ? r.reason : (REASON_LABELS[r.reason] || r.reason);
                    if (displayReason === 'other') displayReason = 'Other';
                    return `
                    <div style="background:white;border:1px solid #e7e5e4;border-radius:24px;padding:24px;margin-bottom:16px;">
                        <div style="display:flex;align-items:flex-start;gap:16px;">
                            <div style="width:56px;height:56px;border-radius:14px;background:#f5f5f4;overflow:hidden;flex-shrink:0;">
                                <img src="${r.image_url ? '../../' + r.image_url : 'https://images.unsplash.com/photo-1596040033229?auto=format&fit=crop&w=200'}" style="width:100%;height:100%;object-fit:cover;" onerror="this.src='https://images.unsplash.com/photo-1596040033229?auto=format&fit=crop&w=200'">
                            </div>
                            <div style="flex:1;">
                                <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
                                    <span style="background:${sc.bg};color:${sc.color};padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;">${sc.label}</span>
                                    <span style="font-size:11px;color:#a8a29e;font-weight:600;">ORD-${r.order_id.toString().padStart(5, '0')}</span>
                                </div>
                                <h3 style="font-size:16px;font-weight:700;color:#1c1917;margin-bottom:4px;">${r.product_name}</h3>
                                <div style="font-size:12px;color:#78716c;font-weight:600;display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;">
                                    <span style="display:flex;align-items:center;gap:4px;"><img src="https://api.iconify.design/lucide:info.svg?color=%2378716c" width="14">${displayReason}</span>
                                    <span style="display:flex;align-items:center;gap:4px;"><img src="https://api.iconify.design/lucide:banknote.svg?color=%2378716c" width="14">${CurrencyManager.format(amount)}</span>
                                    <span style="display:flex;align-items:center;gap:4px;"><img src="https://api.iconify.design/lucide:calendar.svg?color=%2378716c" width="14">${date}</span>
                                </div>
                                ${r.description ? `<p style="margin-top:8px;font-size:12px;color:#78716c;background:#f5f5f4;border-radius:8px;padding:8px 12px;">${r.description}</p>` : ''}
                                 ${r.admin_notes ? `<p style="margin-top:12px;font-size:13px;color:#1e40af;background:#f0f7ff;border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;border:1px solid #e0f2fe;"><img src="https://api.iconify.design/lucide:message-square.svg?color=%231e40af" width="16"> <span><strong style="font-size:12px;color:#1e3a8a;">${r.status === 'rejected' ? 'Farmer Rejection Reason' : 'Admin Response'}: </strong><span style="color:#1e40af;font-weight:600;">${r.admin_notes}</span></span></p>` : ''}
                                ${r.image_path ? `<a href="../../${r.image_path}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:11px;color:#FF7E21;font-weight:700;text-decoration:none;background:rgba(255,126,33,0.1);padding:6px 12px;border-radius:8px;">
                                    <img src="https://api.iconify.design/lucide:camera.svg?color=%23FF7E21" width="14"> View proof image</a>` : ''}
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                container.innerHTML = `<div style="text-align:center;padding:80px;color:#ef4444;font-weight:700;">Connection error. Please refresh.</div>`;
            }
        }

        window.onload = async () => {
            await CurrencyManager.init();
            loadWallet();
            loadReturns('all');
        };
    </script>
    <script src="../assets/js/main.js"></script>
</body>

</html>
